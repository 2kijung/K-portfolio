# ResourceQuota: 네임스페이스 전체 리소스 상한선
apiVersion: v1
kind: ResourceQuota
metadata:
  name: portfolio-quota
  namespace: portfolio
spec:
  hard:
    pods: "20"
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    persistentvolumeclaims: "5"

---
# LimitRange: 파드별 기본 리소스 자동 설정
apiVersion: v1
kind: LimitRange
metadata:
  name: portfolio-limitrange
  namespace: portfolio
spec:
  limits:
    - type: Container
      default:
        cpu: "200m"
        memory: "256Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "1"
        memory: "1Gi"
