apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    # backend 파드에서만 postgres 접근 허용
    - from:
        - podSelector:
            matchLabels:
              app: portfolio-backend
      ports:
        - protocol: TCP
          port: 5432

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-network-policy
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      app: portfolio-backend
  policyTypes:
    - Ingress
  ingress:
    # frontend와 ingress-nginx에서만 backend 접근 허용
    - from:
        - podSelector:
            matchLabels:
              app: portfolio-frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: portfolio
spec:
  podSelector:
    matchLabels:
      app: portfolio-frontend
  policyTypes:
    - Ingress
  ingress:
    # ingress-nginx에서만 frontend 접근 허용
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
