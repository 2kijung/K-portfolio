apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
  namespace: portfolio
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    # host 없음 → IP(192.168.49.2)로 직접 접근 가능, /etc/hosts 불필요
    # 모든 요청을 프론트엔드로 → 프론트엔드 Nginx가 /api/ 를 백엔드로 프록시
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-frontend
                port:
                  number: 80
