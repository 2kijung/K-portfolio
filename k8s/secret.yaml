# 실제 운영 시 base64 인코딩된 값으로 교체하거나
# Sealed Secrets / External Secrets 사용 권장
# echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: portfolio-secret
  namespace: portfolio
type: Opaque
stringData:
  DB_USER: portfolio_user
  DB_PASSWORD: portfolio_password
  JWT_SECRET: please-change-this-secret-key-in-production-min-32-chars
