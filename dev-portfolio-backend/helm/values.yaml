replicaCount: 3

image:
  repository: portfolio-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: portfolio.example.com
      paths:
        - path: /api
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

database:
  host: postgres
  port: 5432
  name: portfolio_db
  user: portfolio_user
  password: portfolio_password

jwt:
  secret: your-secret-key-change-this-in-production-environment-for-security
  expiration: 86400000

postgresql:
  enabled: true
  auth:
    username: portfolio_user
    password: portfolio_password
    database: portfolio_db
  primary:
    persistence:
      enabled: true
      size: 10Gi
